<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Билеты — Операционные системы</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#111;color:#e0e0e0;display:flex;height:100vh;overflow:hidden}
  .sidebar{width:340px;min-width:340px;background:#1a1a2e;border-right:1px solid #2a2a4a;display:flex;flex-direction:column;overflow:hidden}
  .sidebar-header{padding:20px;background:#16162a;border-bottom:1px solid #2a2a4a}
  .sidebar-header h1{font-size:18px;color:#7c7cf0;margin-bottom:4px}
  .sidebar-header p{font-size:12px;color:#888}
  .sidebar-search{padding:12px 16px 8px;background:#16162a}
  .sidebar-search input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #2a2a4a;background:#222244;color:#e0e0e0;font-size:14px;outline:none;transition:border .2s}
  .sidebar-search input:focus{border-color:#7c7cf0}
  .sidebar-search input::placeholder{color:#666}
  .mode-btns{display:flex;gap:6px;padding:8px 16px 4px}
  .mode-btn{flex:1;padding:8px 0;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;font-family:inherit}
  .mode-btn.read{background:#2a2a5a;color:#7c7cf0}
  .mode-btn.read.active{background:#7c7cf0;color:#fff}
  .mode-btn.test{background:#3a2a2a;color:#f07c7c}
  .mode-btn.test.active{background:#cf4a4a;color:#fff}
  .mode-btn.cards{background:#2a3a2a;color:#7cf07c}
  .mode-btn.cards.active{background:#4acf4a;color:#fff}
  .ticket-list{flex:1;overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  .ticket-list::-webkit-scrollbar{width:6px}
  .ticket-list::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:3px}
  .ticket-item{padding:10px 20px;cursor:pointer;border-bottom:1px solid #1a1a30;transition:all .15s;display:flex;align-items:center;gap:10px}
  .ticket-item:hover{background:#1e1e3a}
  .ticket-item.active{background:#2a2a5a;border-left:3px solid #7c7cf0}
  .ticket-item .num{width:26px;height:26px;border-radius:50%;background:#2a2a4a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#7c7cf0;flex-shrink:0}
  .ticket-item.active .num{background:#7c7cf0;color:#fff}
  .ticket-item .title{font-size:12px;line-height:1.3;color:#ccc;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ticket-item.active .title{color:#fff}
  .main{flex:1;overflow-y:auto;overflow-x:hidden;background:#0d0d1a;-webkit-overflow-scrolling:touch}
  .main::-webkit-scrollbar{width:8px}
  .main::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:4px}
  .content{max-width:860px;margin:0 auto;padding:40px 48px 80px}
  .content-header{margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid #1e1e3a}
  .content-header .num-badge{display:inline-block;background:#7c7cf0;color:#fff;padding:2px 12px;border-radius:12px;font-size:12px;font-weight:600;margin-bottom:8px}
  .content-header h2{font-size:24px;color:#f0f0ff;line-height:1.3}
  .section{margin-bottom:24px}
  .section h3{font-size:15px;color:#7c7cf0;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .section p,.section li{font-size:14px;line-height:1.7;color:#bbb}
  .section ul{padding-left:20px}
  .section li{margin-bottom:4px}
  .section li::marker{color:#7c7cf0}
  .highlight{color:#e0e0ff;font-weight:500}
  .code{display:inline-block;background:#1a1a2e;padding:2px 8px;border-radius:4px;font-family:'Cascadia Code','Fira Code',monospace;font-size:13px;color:#b084f0}
  .block{background:#141428;border-left:3px solid #7c7cf0;border-radius:0 8px 8px 0;padding:14px 18px;margin:10px 0;font-size:14px;line-height:1.6;color:#aaa}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#555;text-align:center;padding:40px}
  .empty-state .big{font-size:64px;margin-bottom:16px}
  .empty-state h2{font-size:20px;color:#777;margin-bottom:8px}
  .empty-state p{font-size:14px;color:#555;max-width:360px}
  .progress-bar{height:3px;background:#1a1a2e;border-radius:2px;margin-top:12px;overflow:hidden}
  .progress-bar .fill{height:100%;background:#7c7cf0;border-radius:2px;transition:width .3s}
  .emoji{font-size:1.2em}
  .test-header{text-align:center;margin-bottom:32px}
  .test-header h2{font-size:22px;color:#f07c7c;margin-bottom:4px}
  .test-header p{font-size:13px;color:#888}
  .test-progress{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .test-progress .bar{flex:1;height:4px;background:#1e1e3a;border-radius:2px;overflow:hidden}
  .test-progress .bar .fill{height:100%;background:#f07c7c;border-radius:2px;transition:width .3s}
  .test-progress .label{font-size:12px;color:#888;white-space:nowrap}
  .question-card{background:#141428;border-radius:12px;padding:28px;border:1px solid #2a2a4a}
  .question-card .q-num{font-size:12px;color:#f07c7c;margin-bottom:6px}
  .question-card .q-text{font-size:17px;color:#f0f0ff;line-height:1.5;margin-bottom:20px}
  .answers{display:flex;flex-direction:column;gap:8px}
  .answer{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#1a1a30;border:1px solid #2a2a4a;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;color:#ccc}
  .answer:hover{background:#222244;border-color:#3a3a6a}
  .answer .letter{width:24px;height:24px;border-radius:50%;background:#2a2a4a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#888;flex-shrink:0}
  .answer.selected{border-color:#7c7cf0;background:#222255}
  .answer.correct{border-color:#4acf4a;background:#1a3a1a}
  .answer.correct .letter{background:#4acf4a;color:#fff}
  .answer.wrong{border-color:#cf4a4a;background:#3a1a1a}
  .answer.wrong .letter{background:#cf4a4a;color:#fff}
  .answer.disabled{pointer-events:none;opacity:.7}
  .test-explanation{padding:14px 18px;margin-top:14px;border-radius:8px;font-size:14px;line-height:1.5}
  .test-explanation.correct{background:#1a3a1a;color:#8f8;border:1px solid #4acf4a}
  .test-explanation.wrong{background:#3a1a1a;color:#f88;border:1px solid #cf4a4a}
  .test-actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
  .test-btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;font-family:inherit}
  .test-btn.next{background:#7c7cf0;color:#fff}
  .test-btn.next:hover{background:#6a6ad8}
  .test-btn.finish{background:#cf4a4a;color:#fff}
  .test-btn.finish:hover{background:#b83a3a}
  .test-btn.restart{background:#2a2a5a;color:#7c7cf0}
  .test-btn.restart:hover{background:#3a3a7a}
  .test-btn.secondary{background:#2a2a4a;color:#aaa}
  .test-btn.secondary:hover{background:#3a3a5a}
  .result-card{background:#141428;border-radius:12px;padding:32px;text-align:center;border:1px solid #2a2a4a}
  .result-card .score{font-size:56px;font-weight:700;margin:12px 0}
  .result-card .score.a{color:#4acf4a}
  .result-card .score.b{color:#7cf07c}
  .result-card .score.c{color:#f0f07c}
  .result-card .score.d{color:#f07c7c}
  .result-card .score.e{color:#cf4a4a}
  .result-card .details{font-size:14px;color:#888;margin-bottom:16px}
  .result-card .stats{display:flex;gap:16px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
  .result-card .stat{padding:8px 16px;background:#1a1a30;border-radius:8px;font-size:13px}
  .result-card .stat .val{font-weight:600;color:#f0f0ff}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
  .flashcard{cursor:pointer;perspective:600px;height:140px}
  .flashcard-inner{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d}
  .flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
  .flashcard-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center;font-size:13px;line-height:1.4}
  .flashcard-front{background:#1a1a30;border:1px solid #2a2a4a;color:#e0e0ff}
  .flashcard-back{background:#1a2a1a;border:1px solid #3a5a3a;color:#8f8;transform:rotateY(180deg)}
  .flashcard .hint{font-size:10px;color:#666;margin-top:6px}
  .cards-header{margin-bottom:24px}
  .cards-header h2{font-size:22px;color:#7cf07c;margin-bottom:4px}
  .cards-header p{font-size:13px;color:#888}
  .cards-controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .sidebar-close{display:none;background:none;border:none;color:#888;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s}
  .sidebar-close:hover{background:#2a2a4a;color:#fff}
  .hamburger{display:none;position:fixed;top:12px;left:12px;z-index:100;width:44px;height:44px;border:none;border-radius:10px;background:#1a1a2e;color:#7c7cf0;font-size:22px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.4);transition:all .2s}
  .hamburger:hover{background:#2a2a5a}
  .sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:89;opacity:0;transition:opacity .3s}
  .sidebar-overlay.show{opacity:1}
  .sidebar{transition:transform .3s ease;z-index:90}
  @media(max-width:768px){
    .hamburger{display:flex}
    .sidebar-close{display:block}
    .sidebar{position:fixed;top:0;left:0;height:100vh;width:300px;min-width:300px;max-height:none;transform:translateX(-110%);border-right:1px solid #2a2a4a}
    .sidebar.open{transform:translateX(0)}
    .sidebar-overlay{display:block}
    body{padding-top:0;overflow:auto}
    .main{margin-left:0;width:100%}
    .content{padding:68px 16px 80px}
    .content-header h2{font-size:18px}
    .content-header{margin-bottom:20px;padding-bottom:14px}
    .section{margin-bottom:16px}
    .section p,.section li{font-size:13px;line-height:1.6}
    .section h3{font-size:14px}
    .block{font-size:13px;padding:12px 14px}
    .question-card{padding:18px}
    .question-card .q-text{font-size:15px}
    .answer{padding:10px 12px;font-size:13px;min-height:44px}
    .answer .letter{width:26px;height:26px;font-size:12px}
    .card-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
    .flashcard{height:120px}
    .flashcard-face{font-size:12px;padding:12px}
    .result-card .score{font-size:40px}
    .result-card{padding:20px}
    .test-header h2{font-size:18px}
    .test-btn{padding:12px 20px;font-size:13px;min-height:44px}
    .mode-btn{padding:10px 0;font-size:13px;min-height:44px}
    .ticket-item{padding:12px 16px;min-height:44px}
    .ticket-item .title{font-size:13px}
    .sidebar-header{padding:14px 16px}
    .sidebar-header h1{font-size:16px}
    .sidebar-search{padding:8px 12px}
    .sidebar-search input{font-size:16px;padding:12px 14px}
    .progress-bar{margin-top:10px}
    .cards-controls .test-btn{min-height:44px;font-size:13px}
    .test-actions .test-btn{flex:1;text-align:center}
    .test-actions{flex-direction:column}
    .test-actions .test-btn{width:100%}
    .empty-state .big{font-size:48px}
    .empty-state h2{font-size:18px}
  }
  @media(max-width:480px){
    .sidebar{width:100%;min-width:100%}
    .content{padding:60px 12px 70px}
    .content-header h2{font-size:16px}
    .card-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
    .flashcard{height:100px}
    .flashcard-face{font-size:11px;padding:8px}
    .question-card{padding:14px}
    .question-card .q-text{font-size:14px}
    .answer{padding:8px 10px;font-size:12px;min-height:40px}
    .answer .letter{width:22px;height:22px;font-size:11px}
    .result-card .score{font-size:32px}
    .section p,.section li{font-size:12px}
    .section h3{font-size:13px}
    .block{font-size:12px;padding:10px 12px}
    .code{font-size:11px}
    .ticket-item{padding:10px 12px;min-height:40px}
    .ticket-item .title{font-size:12px}
    .ticket-item .num{width:22px;height:22px;font-size:10px}
    .hamburger{top:8px;left:8px;width:40px;height:40px;font-size:18px}
  }
</style>
</head>
<body>
<button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar">
  <div class="sidebar-header">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h1>📚 Билеты по ОС</h1>
      <button class="sidebar-close" onclick="closeSidebar()" aria-label="Закрыть">✕</button>
    </div>
    <p>81 билет — теория</p>
    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="🔍 Поиск билета..." oninput="filterTickets()">
  </div>
  <div class="mode-btns">
    <button class="mode-btn read active" onclick="switchMode('read')">📖 Читать</button>
    <button class="mode-btn test" onclick="switchMode('test')">🧪 Тест</button>
    <button class="mode-btn cards" onclick="switchMode('cards')">🃏 Карточки</button>
  </div>
  <div class="ticket-list" id="ticketList"></div>
</div>
<div class="main" id="mainContent">
  <div class="empty-state" id="emptyState">
    <div class="big">🎓</div>
    <h2>Выберите билет</h2>
    <p>Нажмите на любой билет слева</p>
  </div>
  <div class="content" id="ticketContent" style="display:none"></div>
</div>
<script>
var tickets = [
  {num:1, title:"Понятие «Операционная система»", content:'<div class="section"><h3>💻 Определение ОС</h3><p><span class="highlight">Операционная система</span> — комплекс взаимосвязанных программ для управления ресурсами компьютера и организации взаимодействия с пользователем. Состоит из <span class="highlight">технической</span> (устройства) и <span class="highlight">программной</span> (ПО) частей.</p></div><div class="section"><h3>🎭 ОС как виртуальная машина</h3><p>ОС скрывает сложность аппаратуры, предоставляя упрощённый интерфейс. Программист вызывает <code class="code">read(file)</code> вместо управления двигателями и головками диска.</p></div><div class="section"><h3>📊 ОС как менеджер ресурсов</h3><p>Распределяет процессор, память, устройства между программами. Предотвращает хаос (очереди на печать, буферизация).</p></div><div class="section"><h3>🛡️ ОС как защитник</h3><p>Обеспечивает сохранность данных, разграничение доступа, предотвращает несанкционированное использование.</p></div><div class="section"><h3>🧬 ОС как ядро</h3><p>Постоянно работает только <span class="highlight">ядро</span> — базовая часть, всегда в памяти.</p></div><div class="block">📌 <strong>Слои ПО:</strong> аппаратура → ядро ОС → утилиты → прикладные программы → пользователь.</div>'},
  {num:2, title:"Основные понятия, концепции ОС. Прерывания. Исключительные ситуации. Файлы. Системные вызовы", content:'<div class="section"><h3>🔌 Системные вызовы (System Calls)</h3><p>Интерфейс между ОС и программой. Программа → библиотека → загрузка регистров → <code class="code">INT</code> → переход в <span class="highlight">kernel mode</span>. Синхронное событие.</p></div><div class="section"><h3>⚡ Аппаратные прерывания</h3><p>Событие от внешнего устройства к процессору. <span class="highlight">Асинхронные</span>. Примеры: клавиатура, диск, таймер (используется для планирования).</p></div><div class="section"><h3>⚠️ Исключения (Exceptions)</h3><p>При невозможности выполнить команду. <span class="highlight">Синхронные</span>. Исправимые (отсутствие страницы) и неисправимые (деление на 0).</p></div><div class="section"><h3>📁 Файлы</h3><p>Именованная область данных на носителе. Файловая система скрывает особенности ввода-вывода. Операции: create, delete, open, close, read, write.</p></div>'},
  {num:3, title:"Архитектурные особенности ОС", content:'<div class="section"><h3>🏗️ Монолитное ядро</h3><p>Одна большая программа. Все компоненты в привилегированном режиме. Прямой вызов процедур — быстро. Недостаток: перекомпиляция для изменений. Пример: <span class="highlight">Linux</span>.</p></div><div class="section"><h3>🧅 Многоуровневые системы</h3><p>Уровень N → только N-1. Нижний — hardware, верхний — пользователь. Хорошо тестируются, но менее эффективны. Впервые: THE (Дейкстра, 1968).</p></div><div class="section"><h3>🎭 Виртуальные машины</h3><p>Копия всего hardware для пользователя. Привилегированные команды → системный вызов к реальной ОС. Примеры: VMware, VirtualBox.</p></div><div class="section"><h3>🧩 Микроядро</h3><p>Большинство компонентов — на уровне пользователя. В ядре: сообщения, планирование, прерывания, память. Модульно, надёжно, но медленнее.</p></div><div class="section"><h3>🔄 Смешанные системы</h3><p>Linux (монолитное + модули), Windows NT (гибрид), macOS XNU, MkLinux.</p></div>'},
  {num:4, title:"Классификация ОС", content:'<div class="section"><h3>📊 По числу задач</h3><ul><li>Однозадачные (MS-DOS)</li><li><span class="highlight">Многозадачные</span> (Unix, Windows) — вытесняющий режим (preemptive)</li></ul></div><div class="section"><h3>👥 По числу пользователей</h3><ul><li>Однопользовательские</li><li><span class="highlight">Многопользовательские</span> (Unix, Windows NT)</li></ul></div><div class="section"><h3>🖥️ По числу процессоров</h3><ul><li><span class="highlight">SMP</span> (симметричные) — равные процессоры</li><li><span class="highlight">ASMP</span> (асимметричные) — master + slave</li></ul></div><div class="section"><h3>⏱️ Реального времени</h3><p>Предельно допустимое время реакции на событие.</p></div>'},
  {num:5, title:"Понятие процесса", content:'<div class="section"><h3>📌 Процесс</h3><p><span class="highlight">Процесс</span> — программа в режиме выполнения. Адресное пространство: код, данные, стек. Нет взаимно-однозначного соответствия между процессом и программой. Процессом управляет ОС, в нём может исполняться код ядра.</p></div>'},
  {num:6, title:"Состояния процесса", content:'<div class="section"><h3>🔄 3 состояния</h3><ul><li><span class="highlight">Готовность (Ready)</span> — ждёт процессор</li><li><span class="highlight">Исполнение (Running)</span> — выполняется</li><li><span class="highlight">Ожидание (Waiting/Blocked)</span> — ждёт события</li></ul></div><div class="block">🔄 Переходы: готовность → исполнение (планировщик) → ожидание (запрос ресурса) → готовность (событие).</div>'},
  {num:7, title:"Операции над процессами и связанные с ними понятия", content:'<div class="section"><h3>👪 Создание</h3><p><span class="highlight">Родитель (parent)</span> → <span class="highlight">ребёнок (child)</span>. В Unix: <code class="code">fork()</code> (копия) + <code class="code">exec()</code> (замена программы).</p></div><div class="section"><h3>📋 PCB (Process Control Block)</h3><p>Структура с состоянием, PC, регистрами, данными планирования, учётом, устройствами.</p></div><div class="section"><h3>🧩 Контекст процесса</h3><ul><li><span class="highlight">Регистровый</span> — содержимое регистров</li><li><span class="highlight">Системный</span> — данные PCB</li><li><span class="highlight">Пользовательский</span> — код и данные</li></ul></div><div class="section"><h3>🔄 Многоразовые операции</h3><p>Запуск (восстановление из PCB), приостановка (прерывание → сохранение), блокировка (системный вызов → ожидание), разблокировка (событие → готовность), переключение контекста.</p></div>'},
  {num:8, title:"Уровни планирования", content:'<div class="section"><h3>📊 Уровни</h3><ul><li><span class="highlight">Долгосрочное</span> (планирование заданий) — редко, минуты. Выбирает задание для загрузки.</li><li><span class="highlight">Краткосрочное</span> (планирование CPU) — каждые ~100 мс. Выбирает следующий процесс.</li></ul></div>'},
  {num:9, title:"Критерии планирования и требования к алгоритмам", content:'<div class="section"><h3>🎯 Критерии</h3><ul><li>⚖️ Справедливость</li><li>💯 Эффективность (CPU 100%)</li><li>⏱️ Сокращение turnaround time</li><li>⏳ Сокращение waiting time</li><li>📞 Сокращение response time</li></ul></div><div class="section"><h3>📋 Требования</h3><p>Предсказуемость, минимальные накладные расходы, равномерная загрузка, масштабируемость.</p></div>'},
  {num:10, title:"Параметры планирования", content:'<div class="section"><h3>📊 Параметры</h3><ul><li><span class="highlight">Статические</span> — размер ОЗУ, число устройств (не меняются)</li><li><span class="highlight">Динамические</span> — свободная память, загрузка (меняются)</li></ul></div><div class="section"><h3>⏲️ CPU burst и I/O burst</h3><p>Процесс = последовательность CPU burst (счёт) ↔ I/O burst (ожидание ввода-вывода).</p></div>'},
  {num:11, title:"Вытесняющее и невытесняющее планирование", content:'<div class="section"><h3>🔀 Режимы</h3><ul><li><span class="highlight">Невытесняющее</span> — процесс занимает CPU сколько нужно. Нет переключений до добровольной отдачи.</li><li><span class="highlight">Вытесняющее</span> — процесс прерывается таймером (квант времени). Используется в системах разделения времени.</li></ul></div>'},
  {num:12, title:"Алгоритмы планирования. FCFS. Round Robin (RR)", content:'<div class="section"><h3>🥇 FCFS (First-Come, First-Served)</h3><p>Очередь FIFO. Невытесняющее. Просто, но "эффект конвоя" — короткие процессы ждут длинных.</p></div><div class="section"><h3>🎡 Round Robin (RR)</h3><p>FCFS + вытеснение. Каждый процесс — <span class="highlight">квант времени</span> (10–100 мс). Если не завершился → в конец очереди. Большой квант → FCFS, малый → иллюзия n CPU.</p></div>'},
  {num:13, title:"Алгоритмы планирования. Многоуровневые очереди (Multilevel Queue)", content:'<div class="section"><h3>📚 Multilevel Queue</h3><p>Процессы делятся на группы, каждая — своя очередь с алгоритмом. Фоновые → FCFS, интерактивные → RR. Внутри очереди — фиксированные приоритеты.</p></div>'},
  {num:14, title:"Алгоритмы планирования. Многоуровневые очереди с обратной связью (Multilevel Feedback Queue)", content:'<div class="section"><h3>🔄 Multilevel Feedback Queue</h3><p>Процесс мигрирует между очередями. Короткие процессы — быстро, длинные — не голодают. Новый → очередь 0 (квант 8), затем 1 (16), 2 (32), 3 (FCFS). Наиболее гибкий подход.</p></div>'},
  {num:15, title:"Алгоритмы планирования. Приоритетное планирование", content:'<div class="section"><h3>🏆 Приоритетное планирование</h3><p>Каждому процессу — числовой приоритет. Внутренние (вычисляются) и внешние (задаются). Вытесняющее или нет. Проблема: "голодание" низкоприоритетных. Решение — <span class="highlight">aging</span> (повышение приоритета со временем).</p></div>'},
  {num:16, title:"Взаимодействующие процессы", content:'<div class="section"><h3>🤝 Кооперация</h3><p>Причины: повышение скорости (пока один ждёт, другой работает), совместные данные, модульность (микроядро), удобство. Процессы изолированы — нужны механизмы ОС. <span class="highlight">Кооперативные</span> — влияют друг на друга через обмен информацией.</p></div>'},
  {num:17, title:"Категории средств обмена информацией", content:'<div class="section"><h3>📊 3 категории</h3><ul><li><span class="emoji">🔔</span> <span class="highlight">Сигнальные</span> — 1 бит, извещение о событии</li><li><span class="emoji">🔗</span> <span class="highlight">Канальные</span> — линии связи (ограниченная пропускная способность)</li><li><span class="emoji">💾</span> <span class="highlight">Разделяемая память</span> — общая область (максимум возможностей)</li></ul></div>'},
  {num:18, title:"Особенности передачи информации с помощью линий связи", content:'<div class="section"><h3>💬 Линии связи</h3><p>Безопаснее разделяемой памяти, информативнее сигналов. Подходят для связи на разных компьютерах.</p></div><div class="section"><h3>📦 Типы буфера</h3><ul><li><span class="highlight">Нулевой</span> — отправитель ждёт получателя</li><li><span class="highlight">Ограниченный</span> — буфер размера n</li><li><span class="highlight">Неограниченный</span> — отправитель никогда не ждёт</li></ul></div><div class="section"><h3>📋 Модели</h3><ul><li>🌊 Потоковая (stream) — поток байт</li><li>✉️ Сообщения (messages) — дискретные сообщения</li></ul></div>'},
  {num:19, title:"Надежность средств связи", content:'<div class="section"><h3>✅ 4 условия</h3><ul><li>Нет потери, повреждения, лишней информации, сохранение порядка</li></ul></div><div class="section"><h3>🛡️ Механизмы</h3><ul><li>Контрольные суммы — проверка целостности</li><li>Подтверждение (ACK) — получатель подтверждает приём</li><li>Тайм-аут + повтор — если ACK не пришёл</li><li>Нумерация — порядок и защита от дублирования</li><li>Коды, исправляющие ошибки (ECC)</li></ul></div>'},
  {num:20, title:"Нити исполнения", content:'<div class="section"><h3>🧵 Нити (Threads)</h3><p>Разделяют код, данные, ресурсы процесса. У каждой — свой PC, регистры, стек. Пока одна нить заблокирована, другая может работать.</p></div><div class="section"><h3>⚙️ Состояния</h3><p>Процесс в готовности — хотя бы одна нить готова. В исполнении — одна нить исполняется. В ожидании — все нити заблокированы.</p></div><div class="section"><h3>💻 Поддержка</h3><ul><li>На уровне <span class="highlight">ядра</span> — планирование в терминах нитей</li><li>На уровне <span class="highlight">библиотек</span> — пользовательские нити</li></ul></div>'},
  {num:21, title:"Interleaving, race condition и взаимоисключения", content:'<div class="section"><h3>🔄 Interleaving</h3><p>Атомарные операции активностей чередуются разными способами → разный результат.</p></div><div class="section"><h3>🏁 Race Condition</h3><p>Недетерминированный набор — результат зависит от порядка чередования. Процессы "состязаются".</p></div><div class="section"><h3>🔒 Взаимоисключение (Mutual Exclusion)</h3><p>Каждый процесс получает эксклюзивный доступ к разделяемым данным — исключает одновременное использование.</p></div>'},
  {num:22, title:"Критическая секция", content:'<div class="section"><h3>⚠️ Critical Section</h3><p>Часть программы, где возможен race condition. В каждый момент — только один процесс в КС. Структура: <span class="highlight">entry section</span> → <strong>critical section</strong> → <span class="highlight">exit section</span> → remainder.</p></div>'},
  {num:23, title:"Программные алгоритмы организации взаимодействия процессов. Требования, предъявляемые к алгоритмам", content:'<div class="section"><h3>📋 5 требований</h3><ol><li>Только программное решение (без спецкоманд)</li><li>Без предположений о скоростях процессов или числе CPU</li><li><span class="highlight">Взаимоисключение</span></li><li><span class="highlight">Прогресс</span> — процессы вне КС не блокируют вход</li><li><span class="highlight">Ограниченное ожидание</span> — нет голодания</li></ol></div>'},
  {num:24, title:"Программные алгоритмы. Запрет прерываний. Строгое чередование. Флаги готовности", content:'<div class="section"><h3>🚫 Запрет прерываний</h3><p>Простое решение: запретить прерывания → КС → разрешить. Но пользователь не должен управлять прерываниями! Только в ядре.</p></div><div class="section"><h3>🔄 Строгое чередование</h3><p>Переменная turn. Есть взаимоисключение, но нарушен <span class="highlight">прогресс</span> — процесс ждёт своей очереди, даже если другой не хочет входить.</p></div><div class="section"><h3>🏴 Флаги готовности</h3><p>Массив ready[]. Есть взаимоисключение, но возможен <span class="highlight">deadlock</span> — оба ready=1 и ждут друг друга.</p></div>'},
  {num:25, title:"Программные алгоритмы организации взаимодействия процессов. Алгоритм Петерсона", content:'<div class="section"><h3>✅ Алгоритм Петерсона (1981)</h3><p>Корректное решение для 2 процессов. Идея: ready[i]=1; turn=1-i; while(ready[1-i] && turn==1-i);</p><p>Удовлетворяет всем 5 требованиям. Если оба подошли одновременно — оба заявят готовность, предложат друг другу, один пройдёт.</p></div>'},
  {num:26, title:"Алгоритм булочной (Bakery algorithm)", content:'<div class="section"><h3>🍞 Алгоритм булочной (Lamport)</h3><p>Решение для N процессов. Каждый получает номер-талончик. При совпадении номеров — сравнивается ID процесса: <code class="code">(number[j],j) < (number[i],i)</code>. Процесс ждёт, пока не наступит его очередь.</p></div>'},
  {num:27, title:"Аппаратная поддержка взаимоисключений", content:'<div class="section"><h3>🔧 Аппаратные атомарные операции</h3><ul><li><span class="highlight">Test-and-Set</span> — проверить и установить за одну операцию</li><li><span class="highlight">Swap</span> — обменять два значения атомарно</li></ul><p>Упрощают реализацию взаимоисключения, повышают эффективность.</p></div>'},
  {num:28, title:"Семафоры", content:'<div class="section"><h3>🚦 Семафоры (Dijkstra, 1965)</h3><p>Целая неотрицательная переменная. Доступ — только через атомарные операции:</p><ul><li><span class="highlight">P(S)</span> (proberen) — пока S==0: блокировка; S=S-1</li><li><span class="highlight">V(S)</span> (verhogen) — S=S+1</li></ul><p>Применение: взаимоисключение (мьютекс=1), синхронизация, producer-consumer.</p></div>'},
  {num:29, title:"Решение проблемы producer-consumer с помощью семафоров", content:'<div class="section"><h3>📦 Producer-Consumer</h3><p>Производитель кладёт данные в буфер, потребитель извлекает. 3 семафора:</p><pre class="block" style="font-family:monospace;white-space:pre-wrap">Semaphore mutex = 1;   // взаимоисключение Semaphore empty = N;   // свободные места Semaphore full = 0;    // занятые места Producer: P(empty)→P(mutex)→put→V(mutex)→V(full) Consumer: P(full)→P(mutex)→get→V(mutex)→V(empty)</pre></div>'},
  {num:30, title:"Мониторы", content:'<div class="section"><h3>👁️ Мониторы</h3><p>Тип данных для ООП. В любой момент только 1 процесс активен внутри (встроенное взаимоисключение). Условные переменные: <code class="code">wait</code> (блокировка) и <code class="code">signal</code> (пробуждение). В отличие от семафоров — не помнят предысторию (signal без wait теряется).</p></div>'},
  {num:31, title:"Тупики", content:'<div class="section"><h3>🔒 Deadlock</h3><p>Процесс ждёт события, которое никогда не произойдёт. Пример: A захватил ленту и ждёт принтер, B — наоборот. Причины: конкуренция за ресурсы, блокировки БД, ошибки программирования. Последовательность: запрос → использование → освобождение.</p></div>'},
  {num:32, title:"Условия возникновения тупиков", content:'<div class="section"><h3>📋 4 условия Коффмана</h3><ol><li><span class="highlight">Взаимоисключение</span> — ресурс может использовать только 1 процесс</li><li><span class="highlight">Ожидание ресурсов</span> (Hold and Wait) — процесс удерживает ресурсы и запрашивает новые</li><li><span class="highlight">Неперераспределяемость</span> (No Preemption) — ресурс нельзя отобрать принудительно</li><li><span class="highlight">Круговое ожидание</span> (Circular Wait) — кольцевая цепь ожидания</li></ol><p>Все 4 необходимы и достаточны.</p></div>'},
  {num:33, title:"Основные направления борьбы с тупиками", content:'<div class="section"><h3>📋 Направления</h3><ol><li><span class="highlight">Игнорирование</span> — Windows, Unix так и делают (тупик редок)</li><li><span class="highlight">Предотвращение</span> — алгоритм банкира (безопасные состояния); нарушение условий (спулинг, двухфазный захват, нумерация ресурсов)</li><li><span class="highlight">Обнаружение</span> — поиск цикла в графе ресурсов</li><li><span class="highlight">Восстановление</span> — завершение процессов, откат, checkpoint</li></ol></div>'},
  {num:34, title:"Обнаружение тупиков", content:'<div class="section"><h3>🔍 Обнаружение</h3><p>Проверка <span class="highlight">цикла</span> в графе распределения ресурсов. Если есть цикл при выполнении первых 3 условий Коффмана — тупик. Визуально цикл виден, но нужны формальные алгоритмы для компьютера.</p></div>'},
  {num:35, title:"Восстановление после тупиков", content:'<div class="section"><h3>🔧 Восстановление</h3><ul><li>💀 <span class="highlight">Завершение процессов</span> — убить один или несколько, освободив ресурсы. Лучше идемпотентные.</li><li>🔄 <span class="highlight">Откат (rollback)</span> — забрать ресурс, передать, вернуть. Не для всех ресурсов.</li><li>📍 <span class="highlight">Контрольные точки</span> — периодическое сохранение состояния.</li></ul></div>'},
  {num:36, title:"Физическая организация памяти компьютера", content:'<div class="section"><h3>🧠 Физическая память</h3><p>Иерархия: регистры CPU → кэш L1/L2/L3 → оперативная память (RAM) → диск. Чем ближе к процессору — тем быстрее и дороже. ОС управляет распределением физической памяти между процессами.</p></div>'},
  {num:37, title:"Логическая память", content:'<div class="section"><h3>📐 Логическая память</h3><p>Адресное пространство процесса — <span class="highlight">логические адреса</span>, которые процесс "видит". Они могут не совпадать с физическими. ОС транслирует логические адреса в физические через блок управления памятью (MMU).</p></div>'},
  {num:38, title:"Связывание адресов", content:'<div class="section"><h3>🔗 Связывание адресов</h3><p>Преобразование логических адресов в физические может происходить на этапах: компиляции (статический), загрузки, выполнения (динамический — наиболее гибкий). MMU (Memory Management Unit) выполняет трансляцию на лету.</p></div>'},
  {num:39, title:"Простейшие схемы управления памятью", content:'<div class="section"><h3>📋 Схемы</h3><ul><li><span class="highlight">Однонепрерывное распределение</span> — одна программа в памяти</li><li><span class="highlight">Фиксированные разделы</span> — память делится на разделы фиксированного размера</li><li><span class="highlight">Динамические разделы</span> — разделы создаются по запросу (внешняя фрагментация)</li><li><span class="highlight">Свопинг</span> — выгрузка процесса на диск и загрузка другого</li></ul></div>'},
  {num:40, title:"Страничная память", content:'<div class="section"><h3>📄 Страничная память (Paging)</h3><p>Физическая память делится на <span class="highlight">кадры (frames)</span> одинакового размера. Логическая — на <span class="highlight">страницы (pages)</span> того же размера. Таблица страниц отображает страницы в кадры. Нет внешней фрагментации.</p></div>'},
  {num:41, title:"Сегментная и сегментно-страничная организация памяти", content:'<div class="section"><h3>📦 Сегментная память</h3><p>Память делится на <span class="highlight">сегменты</span> разного размера (код, данные, стек). Сегменты видны программисту. Есть внешняя фрагментация.</p></div><div class="section"><h3>🔀 Сегментно-страничная</h3><p>Комбинация: программа делится на сегменты, каждый сегмент — на страницы. Преимущества обоих подходов: логическое деление + отсутствие внешней фрагментации.</p></div>'},
  {num:42, title:"Понятие виртуальной памяти", content:'<div class="section"><h3>💭 Виртуальная память</h3><p>Механизм, позволяющий выполнять процессы, размер которых превышает доступную физическую память. Часть страниц — в памяти, часть — на диске (в области подкачки / swap). При обращении к отсутствующей странице — <span class="highlight">страничное прерывание (page fault)</span>.</p></div>'},
  {num:43, title:"Архитектурные средства поддержки виртуальной памяти", content:'<div class="section"><h3>🔧 Аппаратная поддержка</h3><ul><li><span class="highlight">MMU</span> (Memory Management Unit) — преобразует виртуальные адреса в физические</li><li><span class="highlight">TLB</span> (Translation Lookaside Buffer) — быстрый кэш для таблицы страниц</li><li>Бит присутствия в записи таблицы страниц (указывает, в памяти страница или на диске)</li><li>Бит обращения/изменения для алгоритмов замещения</li></ul></div>'},
  {num:44, title:"Структура таблицы страниц", content:'<div class="section"><h3>📋 Таблица страниц</h3><p>Каждая запись содержит: номер кадра, бит присутствия, бит обращения, бит изменения, флаги защиты. Для 32-бит адресации может быть ~1 млн записей — хранится в памяти. Многоуровневые таблицы (2-3 уровня) экономят память.</p></div>'},
  {num:45, title:"Ассоциативная память", content:'<div class="section"><h3>⚡ TLB (Translation Lookaside Buffer)</h3><p>Ассоциативная память — быстрый кэш для таблицы страниц внутри CPU. Хранит недавно использованные трансляции (виртуальный адрес → физический). Поиск по содержимому, а не по адресу. Ускоряет трансляцию в ~100 раз.</p></div>'},
  {num:46, title:"Исключительные ситуации при работе с памятью", content:'<div class="section"><h3>⚠️ Page Fault (страничное прерывание)</h3><p>Возникает при обращении к странице, отсутствующей в памяти. ОС: 1) ищет свободный кадр; 2) загружает страницу с диска; 3) обновляет таблицу страниц; 4) возобновляет процесс. Если нет свободного кадра — применяется алгоритм замещения.</p></div>'},
  {num:47, title:"Стратегии управления страничной памятью", content:'<div class="section"><h3>📊 Стратегии</h3><ul><li><span class="highlight">Подкачка (fetch)</span> — когда загружать страницу: по запросу (demand paging) или заранее (prepaging)</li><li><span class="highlight">Размещение (placement)</span> — куда помещать страницу</li><li><span class="highlight">Замещение (replacement)</span> — какую страницу выгружать, когда память полна</li></ul></div>'},
  {num:48, title:"Алгоритмы замещения страниц", content:'<div class="section"><h3>🔄 Алгоритмы замещения</h3><ul><li><span class="highlight">FIFO</span> — выгружается самая старая страница (простой,但 anomaly Белади)</li><li><span class="highlight">LRU</span> (Least Recently Used) — выгружается давно не использовавшаяся (хорошая производительность)</li><li><span class="highlight">Оптимальный</span> — выгружается та, что не понадобится дольше всех (теоретический минимум)</li><li><span class="highlight">Clock / Second Chance</span> — приближение LRU с битом обращения</li></ul></div>'},
  {num:49, title:"Управление количеством страниц, выделенных процессу. Модель рабочего множества", content:'<div class="section"><h3>📐 Working Set Model</h3><p><span class="highlight">Рабочее множество</span> — набор страниц, которые процесс активно использует в данный момент. Если процессу выделено меньше страниц, чем размер рабочего множества — частые page faults (thrashing). ОС должна выделять процессу столько страниц, сколько в его рабочем множестве.</p></div>'},
  {num:50, title:"Страничные демоны", content:'<div class="section"><h3>👹 Страничные демоны</h3><p>Фоновый процесс (page daemon), который периодически проверяет количество свободных кадров. Если их мало — демон заранее выгружает страницы (используя алгоритм замещения), поддерживая резерв свободных кадров. Встречается в Unix/Linux (kswapd).</p></div>'},
  {num:51, title:"Общие сведения о файлах", content:'<div class="section"><h3>📁 Файлы</h3><p><span class="highlight">Файл</span> — именованная последовательность байтов на внешнем носителе. Атрибуты: имя, тип, размер, права доступа, время создания/изменения. Типы: регулярные, директории, символьные/блочные устройства, сокеты, pipe.</p></div>'},
  {num:52, title:"Организация файлов и доступ к ним", content:'<div class="section"><h3>📋 Организация файлов</h3><ul><li><span class="highlight">Последовательный доступ</span> — чтение с начала</li><li><span class="highlight">Прямой доступ</span> — чтение с указанного блока</li><li><span class="highlight">Индексный доступ</span> — через индекс блоков</li></ul></div>'},
  {num:53, title:"Операции над файлами", content:'<div class="section"><h3>🔧 Операции</h3><p>Создание (create), удаление (delete), открытие (open), закрытие (close), чтение (read), запись (write), изменение позиции (seek), усечение (truncate), получение/установка атрибутов (getattr/setattr).</p></div>'},
  {num:54, title:"Директории. Логическая структура файлового архива", content:'<div class="section"><h3>🗂️ Директории</h3><p><span class="highlight">Директория</span> — специальный файл, содержащий список файлов и поддиректорий. Структуры: одноуровневая, двухуровневая, иерархическая (дерево). В Unix — всё файл, директория — файл с inode.</p></div>'},
  {num:55, title:"Операции над директориями", content:'<div class="section"><h3>🔧 Операции над директориями</h3><p>Создание, удаление (только пустой), открытие, закрытие, чтение, переименование, связывание (link), разрывание связи (unlink), поиск.</p></div>'},
  {num:56, title:"Защита файлов", content:'<div class="section"><h3>🔒 Защита файлов</h3><p>Права доступа: чтение (r), запись (w), исполнение (x). Для 3 категорий: владелец (owner), группа (group), остальные (others). В Unix — 9 бит (rwxrwxrwx). ACL (Access Control Lists) — расширенные списки доступа.</p></div>'},
  {num:57, title:"Общая структура файловой системы", content:'<div class="section"><h3>📊 Структура ФС</h3><p>Слои: прикладные программы → логическая ФС → модуль организации файлов → базовая ФС → драйвер устройства. <span class="highlight">inode</span> (Unix) — структура с метаданными файла (кроме имени). <span class="highlight">Superblock</span> — метаданные ФС (размер, число inode и т.д.).</p></div>'},
  {num:58, title:"Управление внешней памятью", content:'<div class="section"><h3>💾 Управление диском</h3><p>Диск делится на <span class="highlight">блоки</span> (секторы). Методы выделения блоков: <span class="highlight">непрерывное</span> (быстро, но внешняя фрагментация), <span class="highlight">связанное</span> (цепочка блоков), <span class="highlight">индексное</span> (inode с указателями на блоки).</p></div>'},
  {num:59, title:"Управление свободным и занятым дисковым пространством", content:'<div class="section"><h3>📋 Управление пространством</h3><p>Методы: <span class="highlight">битовые карты (bitmap)</span> — каждый блок представлен битом; <span class="highlight">связанный список</span> — цепочка свободных блоков; <span class="highlight">группировка</span> — список списков. Дефрагментация — уплотнение свободного пространства.</p></div>'},
  {num:60, title:"Монтирование файловых систем", content:'<div class="section"><h3>📌 Монтирование</h3><p>Процесс подключения ФС к корневому дереву директорий. Команда <code class="code">mount</code> присоединяет ФС устройства к указанной <span class="highlight">точке монтирования</span>. После монтирования содержимое устройства доступно через эту директорию.</p></div>'},
  {num:61, title:"Связывание файлов", content:'<div class="section"><h3>🔗 Связывание (Linking)</h3><ul><li><span class="highlight">Жёсткая ссылка (hard link)</span> — несколько имён для одного inode. Нельзя для директорий и разных ФС.</li><li><span class="highlight">Символическая ссылка (symlink)</span> — отдельный файл, содержащий путь к другому файлу. Можно для любых объектов.</li></ul></div>'},
  {num:62, title:"Надежность файловой системы", content:'<div class="section"><h3>🛡️ Надёжность ФС</h3><ul><li><span class="highlight">Журналирование (journaling)</span> — запись изменений в журнал перед выполнением. Восстановление после сбоя — по журналу.</li><li><span class="highlight">Проверка целостности</span> — fsck, chkdsk.</li><li><span class="highlight">Резервное копирование</span> — backup, snapshots.</li><li><span class="highlight">RAID</span> — избыточность на уровне дисков.</li></ul></div>'},
  {num:63, title:"Производительность файловой системы", content:'<div class="section"><h3>⚡ Производительность</h3><ul><li><span class="highlight">Кэширование</span> — буферный кэш для часто используемых блоков</li><li><span class="highlight">Опережающее чтение</span> (read-ahead) — предзагрузка следующих блоков</li><li><span class="highlight">Дефрагментация</span> — уменьшение фрагментации</li><li><span class="highlight">Отложенная запись</span> — группировка записей для оптимизации</li></ul></div>'},
  {num:64, title:"Общие сведения об архитектуре компьютера", content:'<div class="section"><h3>🏛️ Архитектура</h3><p>Основные компоненты: <span class="highlight">CPU</span> (процессор), <span class="highlight">память</span> (RAM), <span class="highlight">шина</span> (bus) — соединяет компоненты, <span class="highlight">контроллеры устройств</span>. Архитектура фон Неймана: одно пространство для кода и данных. Гарвардская: раздельные шины.</p></div>'},
  {num:65, title:"Структура контроллера устройства", content:'<div class="section"><h3>🔌 Контроллер устройства</h3><p>Электронная плата, управляющая устройством ввода-вывода. Содержит: <span class="highlight">регистры</span> (команд, данных, состояния), <span class="highlight">буфер</span>, логику управления. Взаимодействует с CPU через порты ввода-вывода или MMIO.</p></div>'},
  {num:66, title:"Прямой доступ к памяти (DMA)", content:'<div class="section"><h3>⚡ DMA (Direct Memory Access)</h3><p>Механизм, позволяющий устройству передавать данные в память напрямую, <span class="highlight">без участия CPU</span>. CPU настраивает DMA-контроллер (адрес, размер, направление) и продолжает работу. По завершении — прерывание. Освобождает CPU от копирования данных.</p></div>'},
  {num:67, title:"Логические принципы организации ввода-вывода", content:'<div class="section"><h3>📋 Принципы ввода-вывода</h3><ul><li><span class="highlight">Программный ввод-вывод (PIO)</span> — CPU сам читает/пишет данные (медленно)</li><li><span class="highlight">Ввод-вывод по прерываниям</span> — устройство прерывает CPU по готовности</li><li><span class="highlight">DMA</span> — прямая передача без CPU</li></ul></div>'},
  {num:68, title:"Интерфейс между базовой подсистемой ввода-вывода и драйверами", content:'<div class="section"><h3>🔗 Интерфейс драйверов</h3><p><span class="highlight">Драйвер</span> — модуль ядра, управляющий устройством. Базовая подсистема ввода-вывода предоставляет единый интерфейс: <code class="code">open, close, read, write, ioctl</code>. Драйвер реализует эти функции для конкретного устройства. Это позволяет ОС работать с любым устройством одинаково.</p></div>'},
  {num:69, title:"Функции базовой подсистемы ввода-вывода", content:'<div class="section"><h3>⚙️ Функции подсистемы ввода-вывода</h3><ul><li>Буферизация данных</li><li>Кэширование</li><li>Спулинг (spooling) — организация очереди</li><li>Обработка прерываний</li><li>Планирование запросов к устройству</li><li>Обработка ошибок</li></ul></div>'},
  {num:70, title:"Алгоритмы планирования запросов к жесткому диску", content:'<div class="section"><h3>💿 Планирование запросов к диску</h3><ul><li><span class="highlight">FCFS</span> — в порядке поступления</li><li><span class="highlight">SSTF</span> (Shortest Seek Time First) — ближайший запрос</li><li><span class="highlight">SCAN (Elevator)</span> — движение головки в одном направлении</li><li><span class="highlight">C-SCAN</span> — циклический SCAN (только в одну сторону)</li><li><span class="highlight">LOOK / C-LOOK</span> — SCAN до последнего запроса (не до края)</li></ul></div>'},
  {num:71, title:"Сетевые и распределенные операционные системы", content:'<div class="section"><h3>🌐 Сетевые ОС</h3><p>Предоставляют сервисы для работы в сети (TCP/IP, файловые серверы, веб-серверы). <span class="highlight">Распределённые ОС</span> — несколько компьютеров работают как единая система. Прозрачность: пользователь не знает, где физически находятся ресурсы.</p></div>'},
  {num:72, title:"Взаимодействие удаленных процессов как основа работы вычислительных сетей", content:'<div class="section"><h3>🤝 Удалённое взаимодействие</h3><p>Процессы на разных компьютерах общаются через сеть. Модели: <span class="highlight">клиент-сервер</span> (запрос-ответ), <span class="highlight">peer-to-peer</span> (равные узлы), <span class="highlight">RPC</span> (Remote Procedure Call) — вызов функции на удалённом компьютере как локальной.</p></div>'},
  {num:73, title:"Понятие протокола", content:'<div class="section"><h3>📋 Протокол</h3><p><span class="highlight">Протокол</span> — набор правил и форматов для обмена данными между устройствами. Определяет: формат сообщений, порядок обмена, обработку ошибок. Примеры: TCP, UDP, IP, HTTP, FTP, SMTP.</p></div>'},
  {num:74, title:"Многоуровневая модель построения сетевых вычислительных систем", content:'<div class="section"><h3>🧅 Модель OSI (7 уровней)</h3><ol><li>Физический — биты, сигналы</li><li>Канальный — кадры, MAC-адреса</li><li>Сетевой — IP, маршрутизация</li><li>Транспортный — TCP/UDP, порты</li><li>Сеансовый — управление сессией</li><li>Представления — кодирование</li><li>Прикладной — HTTP, FTP, SMTP</li></ol></div><div class="section"><h3>🌐 Модель TCP/IP (4 уровня)</h3><p>Канальный → Сетевой (IP) → Транспортный (TCP/UDP) → Прикладной.</p></div>'},
  {num:75, title:"Проблемы адресации в сети", content:'<div class="section"><h3>📍 Адресация в сетях</h3><ul><li><span class="highlight">MAC-адрес</span> — физический адрес устройства (6 байт)</li><li><span class="highlight">IP-адрес</span> — логический адрес узла (IPv4: 4 байта, IPv6: 16 байт)</li><li><span class="highlight">Порт</span> — идентификатор процесса/сервиса</li><li><span class="highlight">DNS</span> — преобразование доменных имён в IP-адреса</li><li><span class="highlight">ARP</span> — преобразование IP в MAC</li></ul></div>'},
  {num:76, title:"Проблемы маршрутизации в сетях", content:'<div class="section"><h3>🗺️ Маршрутизация</h3><p>Выбор пути передачи пакета через сеть. Алгоритмы: <span class="highlight">статическая</span> (фиксированные таблицы) и <span class="highlight">динамическая</span> (адаптивные протоколы). Протоколы: RIP (вектор расстояния), OSPF (состояние каналов), BGP (междоменная).</p></div>'},
  {num:77, title:"Угрозы безопасности", content:'<div class="section"><h3>🔐 Угрозы безопасности</h3><ul><li><span class="highlight">Перехват</span> — чтение данных без разрешения</li><li><span class="highlight">Модификация</span> — изменение данных</li><li><span class="highlight">Подмена</span> — выдача себя за другого</li><li><span class="highlight">Отказ в обслуживании (DoS)</span> — перегрузка системы</li><li><span class="highlight">Вредоносное ПО</span> — вирусы, черви, трояны</li></ul></div>'},
  {num:78, title:"Криптография как одна из базовых технологий безопасности ОС", content:'<div class="section"><h3>🔑 Криптография</h3><p>Наука о шифровании данных. <span class="highlight">Симметричное шифрование</span> — один ключ для шифрования и дешифрования (AES, DES). <span class="highlight">Асимметричное</span> — пара ключей: открытый (шифрование) и закрытый (дешифрование) — RSA.</p></div>'},
  {num:79, title:"Шифрование с использованием алгоритма RSA", content:'<div class="section"><h3>🔐 RSA (Rivest-Shamir-Adleman)</h3><p>Асимметричный алгоритм. Основан на сложности разложения больших чисел на множители. </p><ul><li>Выбираются два больших простых числа p, q</li><li>n = p × q</li><li>Открытый ключ: (e, n), закрытый: (d, n)</li><li>Шифрование: c = m^e mod n</li><li>Дешифрование: m = c^d mod n</li></ul></div>'},
  {num:80, title:"Идентификация и аутентификация", content:'<div class="section"><h3>🆔 Идентификация и аутентификация</h3><p><span class="highlight">Идентификация</span> — предъявление идентификатора (имя, логин). <span class="highlight">Аутентификация</span> — подтверждение, что пользователь — тот, за кого себя выдаёт (пароль, биометрия, токен). Факторы: знание (пароль), владение (ключ), свойство (отпечаток).</p></div>'},
  {num:81, title:"Авторизация. Разграничение доступа к объектам ОС", content:'<div class="section"><h3>🔒 Авторизация</h3><p>Определение прав пользователя на доступ к объектам. <span class="highlight">Дискреционное управление</span> (DAC) — владелец сам назначает права (Unix rwx). <span class="highlight">Мандатное</span> (MAC) — системные правила (SELinux). <span class="highlight">Ролевое</span> (RBAC) — права по ролям.</p></div>'}
];

var mode = 'read', currentTicket = null, testState = null;

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
  document.getElementById('hamburgerBtn').textContent = document.querySelector('.sidebar').classList.contains('open') ? '✕' : '☰';
}

function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  document.getElementById('hamburgerBtn').textContent = '☰';
}

document.addEventListener('touchstart', function(){}, {passive:true});

function renderTickets(list) {
  var container = document.getElementById('ticketList');
  container.innerHTML = '';
  list.forEach(function(t) {
    var div = document.createElement('div');
    div.className = 'ticket-item';
    div.dataset.num = t.num;
    div.innerHTML = '<div class="num">' + t.num + '</div><div class="title">' + t.title + '</div>';
    div.onclick = function() { openTicket(t.num); };
    container.appendChild(div);
  });
}

function filterTickets() {
  if (mode !== 'read') return;
  var q = document.getElementById('searchInput').value.toLowerCase();
  renderTickets(tickets.filter(function(t) { return t.title.toLowerCase().includes(q) || t.num.toString().includes(q); }));
}

function openTicket(num) {
  if (mode !== 'read') switchMode('read');
  closeSidebar();
  currentTicket = num;
  var ticket = tickets.find(function(t) { return t.num === num; });
  if (!ticket) return;
  document.querySelectorAll('.ticket-item').forEach(function(el) { el.classList.toggle('active', parseInt(el.dataset.num) === num); });
  var c = document.getElementById('ticketContent'), e = document.getElementById('emptyState');
  c.style.display = 'block'; e.style.display = 'none';
  c.innerHTML = '<div class="content-header"><div class="num-badge">Билет ' + ticket.num + '</div><h2>' + ticket.title + '</h2></div>' + ticket.content;
  document.getElementById('mainContent').scrollTop = 0;
  updateProgress();
}

function updateProgress() {
  var v = new Set(JSON.parse(localStorage.getItem('viewedTickets') || '[]'));
  document.getElementById('progressFill').style.width = Math.round((v.size / tickets.length) * 100) + '%';
}

document.addEventListener('click', function() {
  if (currentTicket && mode === 'read') {
    var v = new Set(JSON.parse(localStorage.getItem('viewedTickets') || '[]'));
    v.add(currentTicket);
    localStorage.setItem('viewedTickets', JSON.stringify([...v]));
    updateProgress();
  }
});

function switchMode(newMode) {
  closeSidebar();
  mode = newMode;
  document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
  if (newMode === 'read') document.querySelector('.mode-btn.read').classList.add('active');
  else if (newMode === 'test') document.querySelector('.mode-btn.test').classList.add('active');
  else if (newMode === 'cards') document.querySelector('.mode-btn.cards').classList.add('active');
  var si = document.getElementById('searchInput'), tl = document.getElementById('ticketList'), c = document.getElementById('ticketContent'), e = document.getElementById('emptyState');
  if (newMode === 'read') {
    si.style.display = 'block'; si.placeholder = '🔍 Поиск билета...';
    renderTickets(tickets); c.style.display = 'block'; e.style.display = 'none';
    if (currentTicket) openTicket(currentTicket); else if (tickets.length > 0) openTicket(1);
  } else if (newMode === 'test') { si.style.display = 'none'; tl.innerHTML = ''; startTest(); }
  else if (newMode === 'cards') { si.style.display = 'none'; tl.innerHTML = ''; showFlashcards(); }
}

function startTest() {
  testState = { questions: questions.map(function(q,i) { return {index:i, answered:false, selected:null}; }), current: 0, correct: 0, finished: false };
  renderTest();
}

function renderTest() {
  var c = document.getElementById('ticketContent'), e = document.getElementById('emptyState');
  c.style.display = 'block'; e.style.display = 'none';
  if (testState.finished) { renderTestResult(); return; }
  var qIdx = testState.current, qData = questions[qIdx], qState = testState.questions[qIdx], total = questions.length;
  var letters = ['A','B','C','D'], answersHtml = '', nextHtml = '';
  for (var i = 0; i < qData.a.length; i++) {
    var cls = 'answer';
    if (qState.answered) cls += ' disabled';
    if (qState.answered && i === qData.correct) cls += ' correct';
    if (qState.answered && qState.selected === i && i !== qData.correct) cls += ' wrong';
    if (qState.answered && qState.selected === i) cls += ' selected';
    answersHtml += '<div class="' + cls + '" onclick="selectAnswer(' + i + ')"><div class="letter">' + letters[i] + '</div><div>' + qData.a[i] + '</div></div>';
  }
  var expl = qState.answered ? '<div class="test-explanation ' + (qState.selected === qData.correct ? 'correct' : 'wrong') + '">' + (qState.selected === qData.correct ? '✅ ' : '❌ ') + qData.explain + '</div>' : '';
  if (qState.answered) nextHtml = qIdx < total - 1 ? '<button class="test-btn next" onclick="nextQuestion()">Следующий →</button>' : '<button class="test-btn finish" onclick="finishTest()">Завершить</button>';
  c.innerHTML = '<div class="content"><div class="test-header"><h2>🧪 Проверка знаний</h2><p>' + total + ' вопросов</p></div><div class="test-progress"><span class="label">' + (qIdx+1) + '/' + total + '</span><div class="bar"><div class="fill" style="width:' + ((qIdx+1)/total*100) + '%"></div></div></div><div class="question-card"><div class="q-num">Билет №' + qData.ticket + '</div><div class="q-text">' + qData.q + '</div><div class="answers">' + answersHtml + '</div>' + expl + '<div class="test-actions">' + nextHtml + '</div></div></div>';
  document.getElementById('mainContent').scrollTop = 0;
}

function selectAnswer(idx) {
  var qs = testState.questions[testState.current];
  if (qs.answered) return;
  qs.answered = true; qs.selected = idx;
  if (idx === questions[testState.current].correct) testState.correct++;
  renderTest();
}

function nextQuestion() { testState.current++; renderTest(); }

function finishTest() { testState.finished = true; renderTest(); }

function renderTestResult() {
  var t = questions.length, c = testState.correct, p = Math.round(c/t*100);
  var gc = 'e', gt = 'Попробуйте ещё раз 💪';
  if (p >= 90) { gc='a'; gt='Отлично! 🎉'; } else if (p >= 75) { gc='b'; gt='Хорошо! 👍'; } else if (p >= 60) { gc='c'; gt='Неплохо! 📖'; } else if (p >= 40) { gc='d'; gt='Стоит повторить 🤔'; }
  document.getElementById('ticketContent').innerHTML = '<div class="content"><div class="result-card"><div style="font-size:48px;margin-bottom:8px">' + (p>=60?'🎉':'📚') + '</div><h2 style="color:#f0f0ff;margin-bottom:4px">Тест завершён!</h2><div class="score ' + gc + '">' + p + '%</div><div class="details">' + gt + '</div><div class="stats"><div class="stat">✅ <span class="val" style="color:#4acf4a">' + c + '</span></div><div class="stat">❌ <span class="val" style="color:#cf4a4a">' + (t-c) + '</span></div><div class="stat">📊 <span class="val">' + t + '</span></div></div><button class="test-btn restart" onclick="startTest()">🔄 Пройти заново</button><button class="test-btn secondary" onclick="switchMode(\'read\')" style="margin-left:8px">📖 К билетам</button></div></div>';
}

function showFlashcards() {
  var c = document.getElementById('ticketContent'), e = document.getElementById('emptyState');
  c.style.display = 'block'; e.style.display = 'none';
  var cardsHtml = '<div class="content"><div class="cards-header"><h2>🃏 Карточки</h2><p>Кликните для ответа. ' + flashcards.length + ' терминов</p></div><div class="cards-controls"><button class="test-btn restart" onclick="switchMode(\'cards\')">🔄 Перемешать</button><button class="test-btn secondary" onclick="switchMode(\'read\')">📖 К билетам</button></div><div class="card-grid">';
  var sh = flashcards.slice().sort(function() { return Math.random() - 0.5; });
  for (var i = 0; i < sh.length; i++) cardsHtml += '<div class="flashcard" onclick="this.classList.toggle(\'flipped\')"><div class="flashcard-inner"><div class="flashcard-face flashcard-front"><strong>' + sh[i].term + '</strong><div class="hint">👆 нажмите</div></div><div class="flashcard-face flashcard-back">' + sh[i].def + '</div></div></div>';
  cardsHtml += '</div></div>';
  c.innerHTML = cardsHtml;
  document.getElementById('mainContent').scrollTop = 0;
}

renderTickets(tickets);
updateProgress();
if (tickets.length > 0) openTicket(1);
</script>
</body>
</html>
